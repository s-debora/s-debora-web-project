<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>GreenTech Solutions | Home</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>
        <header> 
            <h1>GreenTach Solutions</h1>
            <p>Innovative! Eco-Friendly! Sustainable! GreenTech Solutions is your Solution!</p>
            <img src="../final/images/greenenergy.jpg" alt="Green energy logo" width="600">

            <nav>
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="about.html">About</a>
                <a href="blog.html">Blog</a>
                <a href="contacts.html">Contact Us</a>
            </nav>
        </header>
        <body>
            <main>
                <Section>
                    <h2>We want to hear from you! Contact Us!</h2>
                    <p>Any questions or concerns, please feel free to contact us.</p>
                </Section>
                <section>
                    <form id="contactForm">
                        <label for="name">Full Name</label>
                        <input
                        type="text"
                        id="fullname"
                        name="name" required>
                        <label for="address">Physical Address</label>
                        <input
                        type="text"
                        id="address"
                        name="address"
                        placeholder="1738 East Way" required>
                        <label for="city">City</label>
                        <input
                        type="text"
                        id="city"
                        name="city"
                        placeholder="Las Cruces" required>
                        <label for="state">State</label>
                        <input
                        type="text"
                        id="state"
                        name="state"
                        placeholder="New Mexico" required>
                        <label for="zipcode">Zip Code</label>
                        <input
                        type="text"
                        id="zipcode"
                        name="zipcode"
                        placeholder="88013" required>
                        <label for="phone number">Phone Number</label>
                        <input
                        type="telephone"
                        id="phonenumber"
                        name="phone"
                        placeholder="(345) 678-9012" required>
                        <label for="email">Greentech@email.com</label>
                        <input
                        type="email"
                        id="emailAddress"
                        name="email" required>
                        <label for="message">Message</label>
                        <textarea
                        id="message"
                        name="message"
                        rows="6" required></textarea>
                        <button type="submit">Submit Message</button>
                    </form>
                    <p id = "formMessage"></p>
                </section>
            </main>
               <script src="javascript.js"></script>
        </body>
